services:
  mysql:
    image: mysql:8.0.42
    container_name: mysql
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
      # root 瀵嗙爜
      MYSQL_ROOT_PASSWORD: root
      # 鍒濆鍖栨暟鎹簱(鍚庣画鐨勫垵濮嬪寲sql浼氬湪杩欎釜搴撴墽琛?
      MYSQL_DATABASE: gameluck_vue
    ports:
      - "3306:3306"
    volumes:
      # 鏁版嵁鎸傝浇
      - /docker/mysql/data/:/var/lib/mysql/
      # 閰嶇疆鎸傝浇
      - /docker/mysql/conf/:/etc/mysql/conf.d/
    command:
      # 灏唌ysql8.0榛樿瀵嗙爜绛栫暐 淇敼涓?鍘熷厛 绛栫暐 (mysql8.0瀵瑰叾榛樿绛栫暐鍋氫簡鏇存敼 浼氬鑷村瘑鐮佹棤娉曞尮閰?
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --explicit_defaults_for_timestamp=true
      --lower_case_table_names=1
    privileged: true
    network_mode: "host"

  nginx-web:
    image: nginx:1.23.4
    container_name: nginx-web
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # 璇佷功鏄犲皠
      - /docker/nginx/cert:/etc/nginx/cert
      # 閰嶇疆鏂囦欢鏄犲皠
      - /docker/nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      # 椤甸潰鐩綍
      - /docker/nginx/html:/usr/share/nginx/html
      # 鏃ュ織鐩綍
      - /docker/nginx/log:/var/log/nginx
    privileged: true
    network_mode: "host"

  redis:
    image: redis:7.2.8
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
    volumes:
      # 閰嶇疆鏂囦欢
      - /docker/redis/conf:/redis/config:rw
      # 鏁版嵁鏂囦欢
      - /docker/redis/data/:/redis/data/:rw
    command: "redis-server /redis/config/redis.conf"
    privileged: true
    network_mode: "host"

  minio:
    # pgsty 寮€婧愮ぞ鍖?fork 閲嶆柊缁存姢鐨勬渶鏂扮増 minio
    image: pgsty/minio:RELEASE.2026-02-14T12-00-00Z
    container_name: minio
    ports:
      # api 绔彛
      - "9000:9000"
      # 鎺у埗鍙扮鍙?
      - "9001:9001"
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
      # 绠＄悊鍚庡彴鐢ㄦ埛鍚?
      MINIO_ROOT_USER: gameluck
      # 绠＄悊鍚庡彴瀵嗙爜锛屾渶灏?涓瓧绗?
      MINIO_ROOT_PASSWORD: gameluck123
      # https闇€瑕佹寚瀹氬煙鍚?
      #MINIO_SERVER_URL: "https://xxx.com:9000"
      #MINIO_BROWSER_REDIRECT_URL: "https://xxx.com:9001"
      # 寮€鍚帇缂?on 寮€鍚?off 鍏抽棴
      MINIO_COMPRESS: "off"
      # 鎵╁睍鍚?.pdf,.doc 涓虹┖ 鎵€鏈夌被鍨嬪潎鍘嬬缉
      MINIO_COMPRESS_EXTENSIONS: ""
      # mime 绫诲瀷 application/pdf 涓虹┖ 鎵€鏈夌被鍨嬪潎鍘嬬缉
      MINIO_COMPRESS_MIME_TYPES: ""
    volumes:
      # 鏄犲皠褰撳墠鐩綍涓嬬殑data鐩綍鑷冲鍣ㄥ唴/data鐩綍
      - /docker/minio/data:/data
      # 鏄犲皠閰嶇疆鐩綍
      - /docker/minio/config:/root/.minio/
    command: server --address ':9000' --console-address ':9001' /data  # 鎸囧畾瀹瑰櫒涓殑鐩綍 /data
    privileged: true
    network_mode: "host"

  gameluck-server1:
    image: gameluck/gameluck-server:5.6.2
    container_name: gameluck-server1
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      SNAIL_PORT: 28080
    volumes:
      # 閰嶇疆鏂囦欢
      - /docker/server1/logs/:/gameluck/server/logs/
      # skywalking 鎺㈤拡
#      - /docker/skywalking/agent/:/gameluck/skywalking/agent
    privileged: true
    network_mode: "host"

  gameluck-server2:
    image: gameluck/gameluck-server:5.6.2
    container_name: gameluck-server2
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
      SERVER_PORT: 8081
      SNAIL_PORT: 28081
    volumes:
      # 閰嶇疆鏂囦欢
      - /docker/server2/logs/:/gameluck/server/logs/
      # skywalking 鎺㈤拡
#      - /docker/skywalking/agent/:/gameluck/skywalking/agent
    privileged: true
    network_mode: "host"

  gameluck-monitor-admin:
    image: gameluck/gameluck-monitor-admin:5.6.2
    container_name: gameluck-monitor-admin
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
    volumes:
      # 閰嶇疆鏂囦欢
      - /docker/monitor/logs/:/gameluck/monitor/logs
    privileged: true
    network_mode: "host"

  gameluck-snailjob-server:
    image: gameluck/gameluck-snailjob-server:5.6.2
    container_name: gameluck-snailjob-server
    environment:
      # 鏃跺尯涓婃捣
      TZ: Asia/Shanghai
    ports:
      - "8800:8800"
      - "17888:17888"
    volumes:
      - /docker/snailjob/logs/:/gameluck/snailjob/logs
    privileged: true
    network_mode: "host"
