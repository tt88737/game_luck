services:
  mysql:
    image: mysql:8.4
    container_name: tangluck-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tangluck
      MYSQL_USER: tangluck
      MYSQL_PASSWORD: tangluck
    ports:
      - "3306:3306"
    volumes:
      - tangluck_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  tangluck_mysql:
